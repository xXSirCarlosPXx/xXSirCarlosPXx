# .github/workflows/profile-cards.yml
#
# Vive SOLO en xXSirCarlosPXx/xXSirCarlosPXx, rama main.
# El repo "cards" y las ramas "output" / "github-pages" ya no hacen falta:
# todo se publica directo en la rama "profile-cards" de este mismo repo,
# vía stefanzweifel/git-auto-commit-action (reemplaza a BranchStorageAction,
# copycat-action y ghaction-github-pages, que hacían lo mismo tres veces).
#
# CAMBIOS/MEJORAS vs los 3 workflows originales:
#   - Cron arreglado: "0 */12 * * *" (antes corría cada minuto por error)
#   - Acciones third-party fijadas a su último release en vez de @latest
#   - Un solo mecanismo de publicación (antes había 3 distintos)
#   - `template: repository` apuntaba a "repo: metrics" (el repo del autor
#     de la librería, copiado del ejemplo de la doc) -> corregido a MigaBot
#   - plugin_steam_user pasó de "0" (placeholder inválido) a un secret real
#   - permissions explícitos + concurrency para evitar runs solapados
#
# FIXES DE ESTA REVISIÓN (checkout / rama profile-cards / carpetas):
#   - Todos los jobs que hacen commit ahora corren "actions/checkout@v7"
#     seguido de un paso "Switch to profile-cards" que:
#       * si la rama remota profile-cards ya existe -> hace checkout de ella
#       * si NO existe todavía (primer run) -> la crea como rama huérfana
#     Esto evita el error "Not a git repository" (faltaba el checkout) y
#     evita que profile-cards se resetee al árbol de main en cada run
#     (pasaba porque git-auto-commit-action con create_branch:true crea la
#     rama nueva desde el HEAD actual, y antes ese HEAD era siempre main).
#   - Se quitó el input "repository:" de git-auto-commit-action en snake y
#     summary-cards: ese input apunta a la carpeta donde vive el .git local,
#     NO a la carpeta destino del commit. Con un solo checkout en la raíz,
#     "repository: dist" o "repository: profile-summary-card-output"
#     hacían fallar la Action porque esas carpetas no tienen su propio .git.
#   - Se restauró la estructura de carpetas original que ya existía en la
#     rama profile-cards:
#       profile-metric-card-output/   <- todos los metrics.*.svg
#       profile-snake-card-output/    <- github-contribution-grid-snake*.svg
#       profile-summary-card-output/  <- summary cards de vn7n24fzkq
#     (images/ y videos/ no las toca este workflow, se dejan intactas)
#
# Secrets requeridos:
#   METRICS_TOKEN        -> PAT (classic) scope "repo" + "read:user"
#   SUMMARY_GITHUB_TOKEN  -> PAT para vn7n24fzkq/github-profile-summary-cards
#                            (puede ser el mismo valor que METRICS_TOKEN)
# Secrets opcionales (borra el job si no los vas a usar):
#   SPOTIFY_TOKENS, GOOGLE_MAP_TOKEN, STEAM_TOKEN, STEAM_USER,
#   TWITTER_TOKEN, TWITTER_USER, WAKATIME_TOKEN, STACKOVERFLOW_ID,
#   ANILIST_NAME
#
# NOTA sobre summary-cards: no está confirmado que la Action
# vn7n24fzkq/github-profile-summary-cards@release soporte un input tipo
# OUTPUT_DIR para elegir carpeta de salida. Por eso este workflow NO asume
# eso: deja que la Action escriba donde lo haga por defecto y luego mueve
# los .svg resultantes a profile-summary-card-output/ con un paso "run"
# explícito, antes de commitear. Revisa el primer run para confirmar el
# nombre real de la carpeta que genera (aquí se asume "dist/", ajusta el
# "mv" si es distinto).

name: Profile Cards

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # cada 12 horas en punto

permissions:
  contents: write

concurrency:
  group: profile-cards
  cancel-in-progress: false

# Plantilla usada por cada job "metrics-*":
#   1. genera el SVG con lowlighter/metrics@latest en profile-metric-card-output/
#   2. lo publica en la rama profile-cards con git-auto-commit-action@v7
# lowlighter/metrics@latest es intencional: es el tag flotante que el
# propio proyecto mantiene y recomienda en su documentación oficial.

jobs:

  # ---------- Summary cards (vn7n24fzkq) ----------
  summary-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Switch to profile-cards
        run: |
          git fetch origin profile-cards 2>/dev/null && git checkout profile-cards \
            || git checkout --orphan profile-cards
      - name: Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: -5
          AUTO_PUSH: false
      - name: Move output into profile-summary-card-output
        run: |
          mkdir -p profile-summary-card-output
          # Ajusta "dist" si la Action escribe en otra carpeta por defecto
          if [ -d dist ]; then mv dist/*.svg profile-summary-card-output/ 2>/dev/null || true; fi
          mv ./*.svg profile-summary-card-output/ 2>/dev/null || true
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: profile-cards
          create_branch: true
          commit_message: "chore: update summary cards"
          file_pattern: "profile-summary-card-output/*.svg"

  # ---------- Snake ----------
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Switch to profile-cards
        run: |
          git fetch origin profile-cards 2>/dev/null && git checkout profile-cards \
            || git checkout --orphan profile-cards
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile-snake-card-output/github-contribution-grid-snake.svg
            profile-snake-card-output/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: profile-cards
          create_branch: true
          commit_message: "chore: update snake card"
          file_pattern: "profile-snake-card-output/*.svg"

  # ---------- Metrics: base / header ----------
  metrics-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Switch to profile-cards
        run: |
          git fetch origin profile-cards 2>/dev/null && git checkout profile-cards \
            || git checkout --orphan profile-cards
      - uses: lowlighter/metrics@latest
        with:
          filename: profile-metric-card-output/metrics.github.svg
          token: ${{ secrets.METRICS_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v7
        with: {branch: profile-cards, create_branch: true, commit_message: "chore: update github metrics", file_pattern: "profile-metric-card-output/metrics.github.svg"}

  metrics-base:
    runs-on: ubuntu-latest
