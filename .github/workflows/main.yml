          filename: profile-metric-card-output/metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
      - uses: stefanzweifel/git-auto-commit-action@v7
        with: {branch: profile-cards, create_branch: true, commit_message: "chore: update base metrics", file_pattern: "profile-metric-card-output/metrics.base.svg"}

  metrics-github-classic:
