      - uses: stefanzweifel/git-auto-commit-action@v7
        with: {branch: profile-cards, create_branch: true, commit_message: "chore: update introduction", file_pattern: "metrics.introduction.svg"}

  # ---------- Metrics: actividad ----------
  metrics-achievements:
    runs-on: ubuntu-latest
