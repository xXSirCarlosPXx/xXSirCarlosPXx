# .github/workflows/profile-cards.yml
#
# Vive SOLO en xXSirCarlosPXx/xXSirCarlosPXx, rama main.
# El repo "cards" y las ramas "output" / "github-pages" ya no hacen falta:
# todo se publica directo en la rama "profile-cards" de este mismo repo,
# vía stefanzweifel/git-auto-commit-action (reemplaza a BranchStorageAction,
# copycat-action y ghaction-github-pages, que hacían lo mismo tres veces).
#
# CAMBIOS/MEJORAS vs los 3 workflows originales:
#   - Cron arreglado: "0 */12 * * *" (antes corría cada minuto por error)
#   - Acciones third-party fijadas a su último release en vez de @latest
#   - Un solo mecanismo de publicación (antes había 3 distintos)
#   - `template: repository` apuntaba a "repo: metrics" (el repo del autor
#     de la librería, copiado del ejemplo de la doc) -> corregido a MigaBot
#   - plugin_steam_user pasó de "0" (placeholder inválido) a un secret real
#   - permissions explícitos + concurrency para evitar runs solapados
#
# Secrets requeridos:
#   METRICS_TOKEN        -> PAT (classic) scope "repo" + "read:user"
#   SUMMARY_GITHUB_TOKEN  -> PAT para vn7n24fzkq/github-profile-summary-cards
#                            (puede ser el mismo valor que METRICS_TOKEN)
# Secrets opcionales (borra el job si no los vas a usar):
#   SPOTIFY_TOKENS, GOOGLE_MAP_TOKEN, STEAM_TOKEN, STEAM_USER,
#   TWITTER_TOKEN, TWITTER_USER, WAKATIME_TOKEN, STACKOVERFLOW_ID,
#   ANILIST_NAME

name: Profile Cards

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # cada 12 horas en punto

permissions:
  contents: write

concurrency:
  group: profile-cards
  cancel-in-progress: false

# Plantilla usada por cada job "metrics-*":
#   1. genera el SVG con lowlighter/metrics@latest
#   2. lo publica en la rama profile-cards con git-auto-commit-action@v7
# lowlighter/metrics@latest es intencional: es el tag flotante que el
# propio proyecto mantiene y recomienda en su documentación oficial.

jobs:

  # ---------- Summary cards (vn7n24fzkq) ----------
  summary-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: -5
          AUTO_PUSH: false
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: profile-summary-card-output
          branch: profile-cards
          create_branch: true
          commit_message: "chore: update summary cards"
          file_pattern: "*.svg"

  # ---------- Snake ----------
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          repository: dist
          branch: profile-cards
          create_branch: true
          commit_message: "chore: update snake card"
          file_pattern: "*.svg"

  # ---------- Metrics: base / header ----------
  metrics-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
         ref: profile-cards
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.github.svg
          token: ${{ secrets.METRICS_TOKEN }}
      - uses: stefanzweifel/git-auto-commit-action@v7
        with: {branch: profile-cards, create_branch: true, commit_message: "chore: update github metrics", file_pattern: "metrics.github.svg"}

  metrics-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
         ref: profile-cards
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
      - uses: stefanzweifel/git-auto-commit-action@v7
        with: {branch: profile-cards, create_branch: true, commit_message: "chore: update base metrics", file_pattern: "metrics.base.svg"}

  metrics-github-classic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
         ref: profile-cards
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.classic.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, repositories
          plugin_lines: yes
      - uses: stefanzweifel/git-auto-commit-action@v7
        with: {branch: profile-cards, create_branch: true, commit_message: "chore: update classic metrics", file_pattern: "metrics.classic.svg"}

  metrics-introduction-user:
